services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - LICENSESHELF_PUBLIC_BASE_URL
      - LICENSESHELF_DEVNET_RPC_URL
      - LICENSESHELF_DEVNET_WS_URL
      - LICENSESHELF_DEVNET_SIGNER_KEYPAIR
      - LICENSESHELF_EXECUTE_PLUGIN_COLLECTION_ADDRESS
      - LICENSESHELF_OPERATOR_WALLETS
      - LICENSESHELF_DATA_PATH
      - PORT
    networks:
      - default
      - dokploy-network
    restart: unless-stopped
    volumes:
      - licenseshelf-data:/app/data

networks:
  dokploy-network:
    external: true

volumes:
  licenseshelf-data:
